# ── VPS Production Compose ───────────────────────────────────────────────────
# Copy this file to your VPS along with a .env file.
# Images are pulled from Docker Hub — no source code needed on the VPS.
#
# Usage:
#   docker compose -f docker-compose.vps.yml up -d

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro   # copy db/init.sql to VPS alongside this file
    environment:
      POSTGRES_DB: ${DB_NAME:-realestate}
      POSTGRES_USER: ${DB_USER:-realestate_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-realestate_user} -d ${DB_NAME:-realestate}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  data-worker:
    image: carlostrevisan/realestate-data-worker:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-realestate_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-realestate}
      CENSUS_API_BASE: ${CENSUS_API_BASE:-https://api.census.gov/data/}
      WORKER_PORT: 5000
      PYTHONUNBUFFERED: "1"
    expose:
      - "5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  backend:
    image: carlostrevisan/realestate-backend:latest
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      data-worker:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-realestate_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-realestate}
      WORKER_URL: http://data-worker:5000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    image: carlostrevisan/realestate-frontend:latest
    restart: unless-stopped
    ports:
      - "80:3000"      # serves on port 80 — put a reverse proxy here if you need HTTPS
    depends_on:
      - backend

volumes:
  postgres_data:
    name: realestateoportunity_postgres_data
