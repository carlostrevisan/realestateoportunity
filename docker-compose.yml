services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: ${DB_NAME:-realestate}
      POSTGRES_USER: ${DB_USER:-realestate_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-realestate_user} -d ${DB_NAME:-realestate}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      data-worker:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-realestate_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-realestate}
      WORKER_URL: http://data-worker:5000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:4000

  data-worker:
    build:
      context: ./data-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-realestate_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-realestate}
      CENSUS_API_BASE: ${CENSUS_API_BASE:-https://api.census.gov/data/}
      WORKER_PORT: 5000
      PYTHONUNBUFFERED: "1"
    # Internal port — only reachable by the backend container, not exposed to host
    expose:
      - "5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
    # Named volume — persists across `docker-compose down`
    # Only destroyed with `docker-compose down -v`
    name: realestateoportunity_postgres_data
