services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: ${DB_NAME:-realestate}
      POSTGRES_USER: ${DB_USER:-realestate_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-realestate_user} -d ${DB_NAME:-realestate}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  data-worker:
    image: carlostrevisan/realestate-data-worker:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-realestate_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-realestate}
      CENSUS_API_BASE: ${CENSUS_API_BASE:-https://api.census.gov/data/}
      WORKER_PORT: 5000
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./data-engine/models:/app/models
    expose:
      - "5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  backend:
    image: carlostrevisan/realestate-backend:latest
    restart: unless-stopped
    expose:
      - "4000"
    depends_on:
      db:
        condition: service_healthy
      data-worker:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-realestate_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-realestate}
      WORKER_URL: http://data-worker:5000
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    image: carlostrevisan/realestate-frontend:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  postgres_data:
    name: realestateoportunity_postgres_data
  caddy_data:
  caddy_config:
